<!-- @startingPoint section="Feedback Site" subtitle="Dark feedback-debrief website" viewport="1280x900" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TDR Community Feedback</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--color-bg); color: var(--color-text); font-family: var(--font-body); }
  body { min-height: 100vh; }
  .nav-wrap { position: sticky; top: 0; z-index: 20; }
  a { color: inherit; }
  ::selection { background: var(--color-accent-tint); }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="data.js"></script>
  <script type="text/babel" src="Homepage.jsx"></script>
  <script type="text/babel" src="BucketView.jsx"></script>
  <script type="text/babel" src="ThreadView.jsx"></script>
  <script type="text/babel">
    const { useState } = React;
    const NS = window.TDRCommunityFeedbackDesignSystem_42173e;
    const { TopNav } = NS;
    const D = window.FEEDBACK_DATA;

    const NAV = [
      { id: 'home', label: 'Overview' },
      { id: 'specs', label: 'Specs' },
      { id: 'balance', label: 'Balance' },
      { id: 'features', label: 'Features' },
      { id: 'bugs', label: 'Bug Reports' },
    ];

    function App() {
      const [route, setRoute] = useState({ view: 'home' });
      const go = (r) => { setRoute(r); window.scrollTo({ top: 0 }); };
      const activeId = route.view === 'home' ? 'home' : route.bucket;

      return (
        <>
          <div className="nav-wrap">
            <TopNav
              brand="TDR FEEDBACK"
              links={NAV}
              active={activeId}
              trelloHref={D.trello}
              onNav={(l) => go(l.id === 'home' ? { view: 'home' } : { view: 'bucket', bucket: l.id })}
            />
          </div>
          {route.view === 'home' && <window.Homepage go={go} />}
          {route.view === 'bucket' && <window.BucketView bucket={route.bucket} go={go} />}
          {route.view === 'thread' && <window.ThreadView bucket={route.bucket} thread={route.thread} go={go} />}
          <footer style={{ borderTop: '1px solid var(--color-border)', padding: '24px var(--container-pad)', textAlign: 'center', color: 'var(--color-text-faint)', fontFamily: 'var(--font-mono)', fontSize: 12 }}>
            TDR Community Feedback · compiled from 25 forum threads · internal developer view
          </footer>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
