<!-- @dsCard group="Components" viewport="700x620" name="Feedback — Quotes, Asks, Metrics & Badges" subtitle="The core feedback primitives" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg); color: var(--color-text);
         font-family: var(--font-body); padding: 22px; }
  .stack { display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .label { font-family: var(--font-heading); font-size: 11px; letter-spacing: var(--tracking-label);
           text-transform: uppercase; color: var(--color-text-faint); margin: 6px 0 -2px; }
  .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { MetricCard, QuoteBlock, AskCard, SentimentBadge, CategoryBadge } = window.TDRCommunityFeedbackDesignSystem_42173e;
    function Demo() {
      return (
        <div className="stack">
          <div className="label">Metric callouts</div>
          <div className="grid3">
            <MetricCard icon="◎" value="25" label="Threads" sublabel="across 4 buckets" />
            <MetricCard icon="⚑" value="38" label="Open asks" accent="var(--color-blue)" />
            <MetricCard icon="▲" value="61%" label="Net positive" accent="var(--color-positive)" />
          </div>

          <div className="label">Sentiment & category badges</div>
          <div className="row">
            <SentimentBadge tone="positive" count={42} />
            <SentimentBadge tone="negative" count={17} />
            <SentimentBadge tone="neutral" />
            <SentimentBadge tone="mixed" />
            <CategoryBadge category="specs" />
            <CategoryBadge category="balance" />
            <CategoryBadge category="features" />
            <CategoryBadge category="bugs" />
          </div>

          <div className="label">Quote block</div>
          <QuoteBlock username="Ghost_Recon" timestamp="Mar 14 · 2:08 PM" tone="negative">
            TTK feels inconsistent at range — the same burst kills instantly up close but chips at 30m.
          </QuoteBlock>

          <div className="label">Ask card</div>
          <AskCard
            priority={1}
            ask="Add a stash search/filter — players can't find gear across 200+ slots."
            category="features"
            sentiment="positive"
            mentions={64}
            raisedBy="18 players"
          />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
