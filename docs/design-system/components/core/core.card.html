<!-- @dsCard group="Components" viewport="700x300" name="Core — Button & Avatar" subtitle="Action controls + user monograms" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg); color: var(--color-text);
         font-family: var(--font-body); padding: 22px; }
  .row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 18px; }
  .label { font-family: var(--font-heading); font-size: 11px; letter-spacing: var(--tracking-label);
           text-transform: uppercase; color: var(--color-text-faint); width: 100%; margin-bottom: 2px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Button, Avatar } = window.TDRCommunityFeedbackDesignSystem_42173e;
    function Demo() {
      return (
        <>
          <div className="row"><span className="label">Variants</span>
            <Button variant="primary">Open thread</Button>
            <Button variant="secondary" iconRight="↗">View Trello board</Button>
            <Button variant="ghost">Dismiss</Button>
            <Button variant="danger">Flag</Button>
            <Button variant="primary" disabled>Disabled</Button>
          </div>
          <div className="row"><span className="label">Sizes</span>
            <Button size="sm">Small</Button>
            <Button size="md">Medium</Button>
            <Button size="lg">Large</Button>
          </div>
          <div className="row"><span className="label">Avatars</span>
            <Avatar name="Ghost Recon" />
            <Avatar name="Echo_7" />
            <Avatar name="DevTeam" size={48} color="var(--color-accent)" />
            <Avatar name="Tango Down" size={28} />
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
