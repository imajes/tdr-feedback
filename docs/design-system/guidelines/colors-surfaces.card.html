<!-- @dsCard group="Colors" viewport="700x150" name="Base surfaces" subtitle="Near-black GitHub-dark steps + borders" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--color-bg); font-family:var(--font-body); padding:18px; }
  .row { display:flex; gap:10px; }
  .sw { flex:1; border-radius:var(--radius-md); border:1px solid var(--color-border); overflow:hidden; }
  .chip { height:58px; }
  .meta { padding:7px 9px; }
  .name { font-family:var(--font-heading); font-weight:600; font-size:11px; color:var(--color-text); letter-spacing:.02em; }
  .hex { font-family:var(--font-mono); font-size:10.5px; color:var(--color-text-faint); margin-top:2px; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#0d1117"></div><div class="meta"><div class="name">bg</div><div class="hex">#0D1117</div></div></div>
    <div class="sw"><div class="chip" style="background:#161b22"></div><div class="meta"><div class="name">surface-2 · card</div><div class="hex">#161B22</div></div></div>
    <div class="sw"><div class="chip" style="background:#1c2128"></div><div class="meta"><div class="name">surface-3 · hover</div><div class="hex">#1C2128</div></div></div>
    <div class="sw"><div class="chip" style="background:#21262d"></div><div class="meta"><div class="name">surface-4 · input</div><div class="hex">#21262D</div></div></div>
    <div class="sw"><div class="chip" style="background:#2a313a"></div><div class="meta"><div class="name">border</div><div class="hex">#2A313A</div></div></div>
  </div>
</body></html>
