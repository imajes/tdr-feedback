<!-- @dsCard group="Spacing" viewport="700x150" name="Radii & elevation" subtitle="Restrained corners + dark-UI surface steps" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--color-bg); font-family:var(--font-body); padding:20px; }
  .row { display:flex; gap:16px; align-items:center; }
  .box { width:84px; height:64px; background:var(--color-surface-3); border:1px solid var(--color-border); display:flex; align-items:flex-end; padding:7px; }
  .lab { font-family:var(--font-mono); font-size:10px; color:var(--color-text-faint); }
  .sh { box-shadow:0 12px 32px rgba(0,0,0,.5); }
</style></head>
<body>
  <div class="row">
    <div><div class="box" style="border-radius:4px"><span class="lab">sm 4</span></div></div>
    <div><div class="box" style="border-radius:6px"><span class="lab">md 6</span></div></div>
    <div><div class="box" style="border-radius:8px"><span class="lab">lg 8</span></div></div>
    <div><div class="box" style="border-radius:999px;width:64px"><span class="lab">pill</span></div></div>
    <div><div class="box sh" style="border-radius:8px"><span class="lab">shadow-lg</span></div></div>
  </div>
</body></html>
