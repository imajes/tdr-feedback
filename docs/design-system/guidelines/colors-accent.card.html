<!-- @dsCard group="Colors" viewport="700x150" name="Accent & secondary" subtitle="Desaturated amber accent + cold blue" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--color-bg); font-family:var(--font-body); padding:18px; }
  .row { display:flex; gap:10px; }
  .sw { flex:1; border-radius:var(--radius-md); border:1px solid var(--color-border); overflow:hidden; }
  .chip { height:58px; }
  .meta { padding:7px 9px; }
  .name { font-family:var(--font-heading); font-weight:600; font-size:11px; color:var(--color-text); letter-spacing:.02em; }
  .hex { font-family:var(--font-mono); font-size:10.5px; color:var(--color-text-faint); margin-top:2px; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#d28e54"></div><div class="meta"><div class="name">accent</div><div class="hex">#D28E54</div></div></div>
    <div class="sw"><div class="chip" style="background:#e3a268"></div><div class="meta"><div class="name">accent-bright</div><div class="hex">#E3A268</div></div></div>
    <div class="sw"><div class="chip" style="background:#a36c3e"></div><div class="meta"><div class="name">accent-dim</div><div class="hex">#A36C3E</div></div></div>
    <div class="sw"><div class="chip" style="background:#5b94c2"></div><div class="meta"><div class="name">blue</div><div class="hex">#5B94C2</div></div></div>
    <div class="sw"><div class="chip" style="background:#74a8d2"></div><div class="meta"><div class="name">blue-bright</div><div class="hex">#74A8D2</div></div></div>
  </div>
</body></html>
