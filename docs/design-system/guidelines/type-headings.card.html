<!-- @dsCard group="Type" viewport="700x180" name="Headings — Montserrat" subtitle="Display & section headings, semibold/bold" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--color-bg); font-family:var(--font-heading); padding:18px 20px; color:var(--color-text); }
  .spec { display:flex; align-items:baseline; gap:14px; padding:6px 0; border-bottom:1px solid var(--color-border-faint); }
  .spec:last-child { border:0; }
  .tag { font-family:var(--font-mono); font-size:10px; color:var(--color-text-faint); width:120px; flex:0 0 auto; }
</style></head>
<body>
  <div class="spec"><span class="tag">3xl · 54 / 700</span><span style="font-size:38px;font-weight:700;letter-spacing:-.02em;">Field Ops Debrief</span></div>
  <div class="spec"><span class="tag">2xl · 38 / 700</span><span style="font-size:28px;font-weight:700;letter-spacing:-.02em;">Balance &amp; Specs</span></div>
  <div class="spec"><span class="tag">xl · 28 / 600</span><span style="font-size:22px;font-weight:600;">Top-priority asks</span></div>
  <div class="spec"><span class="tag">label · 11 / 600</span><span style="font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-muted);">Bug Reports · 7 threads</span></div>
</body></html>
