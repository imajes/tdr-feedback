<!-- @dsCard group="Colors" viewport="700x150" name="Sentiment & category" subtitle="Muted teal / red-orange / slate + bucket hues" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--color-bg); font-family:var(--font-body); padding:18px; }
  .grp { font-family:var(--font-heading); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--color-text-faint); margin:0 0 7px; }
  .row { display:flex; gap:10px; margin-bottom:12px; }
  .sw { flex:1; border-radius:var(--radius-md); border:1px solid var(--color-border); overflow:hidden; }
  .chip { height:34px; }
  .meta { padding:5px 8px; }
  .name { font-family:var(--font-heading); font-weight:600; font-size:10.5px; color:var(--color-text); }
  .hex { font-family:var(--font-mono); font-size:10px; color:var(--color-text-faint); margin-top:1px; }
</style></head>
<body>
  <div class="grp">Sentiment</div>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#4f9e8c"></div><div class="meta"><div class="name">positive</div><div class="hex">#4F9E8C</div></div></div>
    <div class="sw"><div class="chip" style="background:#cf6a4f"></div><div class="meta"><div class="name">negative</div><div class="hex">#CF6A4F</div></div></div>
    <div class="sw"><div class="chip" style="background:#7c8794"></div><div class="meta"><div class="name">neutral</div><div class="hex">#7C8794</div></div></div>
  </div>
  <div class="grp">Category</div>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#b07fc4"></div><div class="meta"><div class="name">specs</div><div class="hex">#B07FC4</div></div></div>
    <div class="sw"><div class="chip" style="background:#c2a14a"></div><div class="meta"><div class="name">balance</div><div class="hex">#C2A14A</div></div></div>
    <div class="sw"><div class="chip" style="background:#5b94c2"></div><div class="meta"><div class="name">features</div><div class="hex">#5B94C2</div></div></div>
    <div class="sw"><div class="chip" style="background:#cf6a4f"></div><div class="meta"><div class="name">bugs</div><div class="hex">#CF6A4F</div></div></div>
  </div>
</body></html>
